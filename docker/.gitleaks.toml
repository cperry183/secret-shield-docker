# Gitleaks Configuration File
# This is the default configuration for Secret Shield Docker
# Customize this file to match your organization's secret detection requirements

# Global settings
[global]
title = "Secret Shield Gitleaks Configuration"
description = "Default configuration for detecting secrets in code repositories"

# Allowlist configuration
# Use this to exclude specific files, paths, or patterns from scanning
[allowlist]
# Example: ignore test files
paths = [
    "(?i)test.*",
    "(?i).*\\.test\\..*",
    "(?i)mock.*",
]

# Regex patterns for common secrets
# These are built-in rules from Gitleaks

# AWS Access Key
[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AIDA|AIPS|AIEA|AIFE|AIGA|AIGH|AIGL|AIGM|AIGN|AIIO|AIJA|AIJB|AIJC|AIJD|AIJE|AIJF|AIJG|AIJH|AIJI|AIJJ|AIJK|AIJL|AIJM|AIJN|AIJO|AIJP|AIJQ|AIJR|AIJS|AIJT|AIJU|AIJV|AIJW|AIJX|AIJY|AIJZ|AIKA|AIKB|AIKC|AIKD|AIKE|AIKF|AIKG|AIKH|AIKI|AIKJ|AIKK|AIKL|AIKM|AIKN|AIKO|AIKP|AIKQ|AIKR|AIKS|AIKT|AIKU|AIKV|AIKW|AIKX|AIKY|AIKZ|AILA|AILB|AILC|AILD|AILE|AILF|AILG|AILH|AILI|AILJ|AILK|AILL|AILM|AILN|AILO|AILP|AILQ|AILR|AILS|AILT|AILU|AILV|AILW|AILX|AILY|AILZ)[0-9A-Z]{16}'''
entropy = 3.5
keywords = ["aws", "access", "key"]

# GitHub Personal Access Token
[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''ghp_[0-9a-zA-Z]{36}'''
entropy = 3.5
keywords = ["github", "token", "pat"]

# GitHub OAuth Token
[[rules]]
id = "github-oauth"
description = "GitHub OAuth Token"
regex = '''gho_[0-9a-zA-Z]{36}'''
entropy = 3.5
keywords = ["github", "oauth"]

# Slack Token
[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-([0-9]{12})-([0-9]{12})-([0-9a-zA-Z]{24,34})'''
entropy = 3.5
keywords = ["slack", "token"]

# Private Key
[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (?:RSA|DSA|EC|PGP|OPENSSH) PRIVATE KEY-----'''
entropy = 3.5
keywords = ["private", "key", "rsa", "dsa", "ec", "pgp"]

# Database Connection String
[[rules]]
id = "database-url"
description = "Database Connection String"
regex = '''(?i)(mysql|postgres|mongodb|redis):\/\/[^\s]+:[^\s]+@[^\s]+'''
entropy = 3.5
keywords = ["database", "connection", "password"]

# API Key Generic
[[rules]]
id = "api-key-generic"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey)['\"]?\s*[:=]\s*['\"]?[a-zA-Z0-9_\-]{20,}['\"]?'''
entropy = 3.5
keywords = ["api", "key"]

# JWT Token
[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'''
entropy = 3.5
keywords = ["jwt", "token"]

# Artifactory Credentials
[[rules]]
id = "artifactory-credentials"
description = "Artifactory Credentials"
regex = '''(?i)(artifactory|artifactoryonline)[_-]?password['\"]?\s*[:=]\s*['\"]?[a-zA-Z0-9_\-]{20,}['\"]?'''
entropy = 3.5
keywords = ["artifactory", "password"]

# NPM Token
[[rules]]
id = "npm-token"
description = "NPM Token"
regex = '''npm_[a-zA-Z0-9]{36}'''
entropy = 3.5
keywords = ["npm", "token"]

# Twilio API Key
[[rules]]
id = "twilio-api-key"
description = "Twilio API Key"
regex = '''SK[a-z0-9]{32}'''
entropy = 3.5
keywords = ["twilio", "api", "key"]
