name: CI/CD Pipeline with Secret Shield

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Secret Shield image
        run: |
          docker build \
            --build-arg GITLEAKS_VERSION=v8.24.2 \
            -t secret-shield:latest \
            -f docker/Dockerfile \
            .

      - name: Run secret scan
        id: scan
        run: |
          mkdir -p reports
          docker run --rm \
            -v ${{ github.workspace }}:/scan \
            -v ${{ github.workspace }}/docker/.gitleaks.toml:/app/.gitleaks.toml:ro \
            -v ${{ github.workspace }}/.gitleaksignore:/app/.gitleaksignore:ro \
            -v ${{ github.workspace }}/reports:/app/reports \
            -e SCAN_PATH=/scan \
            -e REPORT_FORMAT=json \
            -e REPORT_PATH=/app/reports/gitleaks-report.json \
            secret-shield:latest || SCAN_EXIT=$?
          
          if [ -f "reports/gitleaks-report.json" ]; then
            FINDINGS=$(jq 'length' reports/gitleaks-report.json)
            echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          fi
          exit ${SCAN_EXIT:-0}
        continue-on-error: true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: secret-scan
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t myapp:${{ github.sha }} .
          docker tag myapp:${{ github.sha }} myapp:latest

      - name: Run tests
        run: |
          echo "Running application tests..."
          # Add your test commands here

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Deploying to production..."
          # Add your deployment commands here
