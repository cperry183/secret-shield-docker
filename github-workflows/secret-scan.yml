name: Secret Scan

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  secret-scan:
    name: Secret Scan with Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Secret Shield Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: secret-shield:latest
          build-args: |
            GITLEAKS_VERSION=v8.24.2

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run secret scan
        id: scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/scan \
            -v ${{ github.workspace }}/docker/.gitleaks.toml:/app/.gitleaks.toml:ro \
            -v ${{ github.workspace }}/.gitleaksignore:/app/.gitleaksignore:ro \
            -v ${{ github.workspace }}/reports:/app/reports \
            -e SCAN_PATH=/scan \
            -e REPORT_FORMAT=json \
            -e REPORT_PATH=/app/reports/gitleaks-report.json \
            -e EXIT_ON_FINDING=true \
            -e VERBOSE=false \
            secret-shield:latest || SCAN_EXIT=$?
          
          if [ -f "reports/gitleaks-report.json" ]; then
            FINDINGS=$(jq 'length' reports/gitleaks-report.json)
            echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          else
            echo "findings=0" >> $GITHUB_OUTPUT
          fi
          
          exit ${SCAN_EXIT:-0}
        continue-on-error: true

      - name: Convert report to SARIF format
        if: always() && hashFiles('reports/gitleaks-report.json') != ''
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/reports:/app/reports \
            -e SCAN_PATH=/scan \
            -e REPORT_FORMAT=sarif \
            -e REPORT_PATH=/app/reports/gitleaks-report.sarif \
            secret-shield:latest || true

      - name: Upload SARIF report to GitHub Security
        if: always() && hashFiles('reports/gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: reports/gitleaks-report.sarif
          category: gitleaks

      - name: Upload JSON report as artifact
        if: always() && hashFiles('reports/gitleaks-report.json') != ''
        uses: actions/upload-artifact@v3
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.json
          retention-days: 30

      - name: Comment on PR with findings
        if: github.event_name == 'pull_request' && steps.scan.outputs.findings > 0
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const findings = ${{ steps.scan.outputs.findings }};
            const comment = `🔐 **Secret Scan Results**\n\n⚠️ **${findings} potential secret(s) detected** in this pull request.\n\nPlease review the [scan report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n**Actions:**\n- Review the findings in the Security tab\n- If this is a false positive, add the fingerprint to \`.gitleaksignore\`\n- Rotate any exposed credentials immediately`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if secrets detected
        if: steps.scan.outputs.findings > 0 && github.event_name != 'pull_request'
        run: |
          echo "❌ Secret scan failed: ${{ steps.scan.outputs.findings }} secret(s) detected"
          exit 1

      - name: Success message
        if: success()
        run: echo "✅ Secret scan completed successfully - no secrets detected"
