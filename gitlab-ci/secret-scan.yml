# GitLab CI/CD Pipeline for Secret Shield Docker
# Include this file in your .gitlab-ci.yml:
#
# include:
#   - local: 'gitlab-ci/secret-scan.yml'
#
# Then use the job:
#
# secret-scan:
#   extends: .secret_scan
#   stage: scan

stages:
  - build
  - scan
  - report

# Define the secret scan job template
.secret_scan:
  stage: scan
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
    SCAN_PATH: "/builds/$CI_PROJECT_PATH"
    REPORT_FORMAT: "json"
    REPORT_PATH: "reports/gitleaks-report.json"
    EXIT_ON_FINDING: "true"
    VERBOSE: "false"
  before_script:
    - mkdir -p reports
    - apk add --no-cache jq git
  script:
    - |
      echo "🔐 Starting Secret Shield scan..."
      echo "Project: $CI_PROJECT_PATH"
      echo "Branch: $CI_COMMIT_REF_NAME"
      echo "Commit: $CI_COMMIT_SHA"
      
      # Build the Docker image
      docker build \
        --build-arg GITLEAKS_VERSION=v8.24.2 \
        -t secret-shield:latest \
        -f docker/Dockerfile \
        .
      
      # Run the scan
      docker run --rm \
        -v $SCAN_PATH:/scan \
        -v $SCAN_PATH/docker/.gitleaks.toml:/app/.gitleaks.toml:ro \
        -v $SCAN_PATH/.gitleaksignore:/app/.gitleaksignore:ro \
        -v $SCAN_PATH/reports:/app/reports \
        -e SCAN_PATH=/scan \
        -e REPORT_FORMAT=$REPORT_FORMAT \
        -e REPORT_PATH=/app/reports/gitleaks-report.json \
        -e EXIT_ON_FINDING=$EXIT_ON_FINDING \
        -e VERBOSE=$VERBOSE \
        secret-shield:latest || SCAN_EXIT=$?
      
      # Check results
      if [ -f "reports/gitleaks-report.json" ]; then
        FINDINGS=$(jq 'length' reports/gitleaks-report.json)
        echo "Findings: $FINDINGS"
        
        if [ "$FINDINGS" -gt 0 ]; then
          echo "⚠️  Secrets detected:"
          jq '.[] | "\(.File):\(.Line) - \(.RuleID)"' reports/gitleaks-report.json
        fi
      else
        FINDINGS=0
      fi
      
      exit ${SCAN_EXIT:-0}
  after_script:
    - |
      if [ -f "reports/gitleaks-report.json" ]; then
        FINDINGS=$(jq 'length' reports/gitleaks-report.json 2>/dev/null || echo "0")
        echo "Secret Scan Results: $FINDINGS findings"
      fi
  artifacts:
    name: "gitleaks-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - reports/gitleaks-report.json
    reports:
      sast: reports/gitleaks-report.json
    expire_in: 30 days
    when: always
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  allow_failure: false
  tags:
    - docker

# Pre-commit scan job (runs on merge requests)
.secret_scan_mr:
  extends: .secret_scan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - |
      echo "🔐 Running Secret Shield scan on MR changes..."
      
      # Build the Docker image
      docker build \
        --build-arg GITLEAKS_VERSION=v8.24.2 \
        -t secret-shield:latest \
        -f docker/Dockerfile \
        .
      
      # Scan only the merge request changes
      docker run --rm \
        -v $SCAN_PATH:/scan \
        -v $SCAN_PATH/docker/.gitleaks.toml:/app/.gitleaks.toml:ro \
        -v $SCAN_PATH/.gitleaksignore:/app/.gitleaksignore:ro \
        -v $SCAN_PATH/reports:/app/reports \
        -e SCAN_PATH=/scan \
        -e REPORT_FORMAT=$REPORT_FORMAT \
        -e REPORT_PATH=/app/reports/gitleaks-report.json \
        -e EXIT_ON_FINDING=$EXIT_ON_FINDING \
        -e VERBOSE=$VERBOSE \
        secret-shield:latest || SCAN_EXIT=$?
      
      exit ${SCAN_EXIT:-0}

# Scheduled nightly scan job
.secret_scan_scheduled:
  extends: .secret_scan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - |
      echo "🔐 Running scheduled Secret Shield scan..."
      
      # Build the Docker image
      docker build \
        --build-arg GITLEAKS_VERSION=v8.24.2 \
        -t secret-shield:latest \
        -f docker/Dockerfile \
        .
      
      # Full repository scan
      docker run --rm \
        -v $SCAN_PATH:/scan \
        -v $SCAN_PATH/docker/.gitleaks.toml:/app/.gitleaks.toml:ro \
        -v $SCAN_PATH/.gitleaksignore:/app/.gitleaksignore:ro \
        -v $SCAN_PATH/reports:/app/reports \
        -e SCAN_PATH=/scan \
        -e REPORT_FORMAT=$REPORT_FORMAT \
        -e REPORT_PATH=/app/reports/gitleaks-report.json \
        -e EXIT_ON_FINDING=$EXIT_ON_FINDING \
        -e VERBOSE=$VERBOSE \
        secret-shield:latest || SCAN_EXIT=$?
      
      exit ${SCAN_EXIT:-0}
